spring.application.name=projet_club_escalade

spring.datasource.url=jdbc:h2:file:./data/escaladedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Console H2 désactivée en production (sécurité)
spring.h2.console.enabled=false
# Port dynamique : Railway injecte $PORT, fallback sur 9090 en local
server.port=${PORT:9090}

app.data.categories=30
app.data.membres=250
app.data.sorties=4000

# Configuration mail - utiliser des variables d'environnement en production
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:10025}
spring.mail.username=${MAIL_USERNAME:test}
spring.mail.password=${MAIL_PASSWORD:test}

spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
